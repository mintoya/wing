name: Build and Deploy WASM

on:
  push:
    branches:
      - master 
    paths:
      - '**.cpp'
      - '**.h'
      - '**.js'

permissions:
  contents: write  # Allows to commit files 

jobs:
  build-and-update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile C++ to WASM
        run: |
           emcc -x c++ examples\includeAll.c -o vason_parser.js --bind -s ALLOW_MEMORY_GROWTH=1 -DnoAssertMessage -O3 -s WASM_ASYNC_COMPILATION=0
          
      - name: Copy files to docs folder
        run: |
          mkdir -p docs/vason_wasm
          cp vason_wasm/vason_parser.js docs/vason_wasm/
          cp vason_wasm/vason_parser.wasm docs/vason_wasm/
          cp vason_wasm/vason.js docs/vason_wasm/
          cp vason_wasm/vason_test.js docs/vason_wasm/

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vason_wasm/
          
          # This checks if the compiled files actually changed before trying to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-compile WASM and update docs" && git push)
